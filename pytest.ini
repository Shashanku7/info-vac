[pytest]
asyncio_mode = auto
testpaths = tests

# Decision #2 (OPEN_DECISIONS.md): @pytest.mark.live gates tests that hit
# external APIs (Tavily, Firecrawl, Gemini). Default run skips them.
# Phase-gate certification: pytest -m live
markers =
    live: marks tests that require real external API calls (deselect with -m "not live")

# Warn on unknown marks (prevents silent typo-markers)
addopts = --strict-markers

filterwarnings =
    ignore::FutureWarning:google.*
    ignore::UserWarning:firecrawl.*

