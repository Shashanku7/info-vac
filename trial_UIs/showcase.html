<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoVac UI Gallery Showcase</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN for JSX compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@405;700&display=swap');
    body {
      font-family: 'Outfit', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── Icons ──
    const SparklesIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="inline mr-1.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/></svg>
    );

    // ── Main Page Component ──
    function App() {
      const [activeTheme, setActiveTheme] = useState("aceternity");
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [query, setQuery] = useState("Starbucks, Delta, Marriott");

      return (
        <div className={`min-h-screen flex flex-col transition-colors duration-300 ${isDarkMode ? "bg-[#09090b] text-stone-200" : "bg-[#f5f5f7] text-stone-800"}`}>
          {/* Header */}
          <header className={`sticky top-0 z-50 border-b backdrop-blur-md px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 transition-colors ${
            isDarkMode ? "bg-[#09090b]/90 border-stone-800" : "bg-white/95 border-stone-200"
          }`}>
            <div>
              <h1 className={`text-sm font-extrabold uppercase tracking-widest ${isDarkMode ? "text-white" : "text-stone-900"}`}>InfoVac UI Gallery</h1>
              <p className="text-[10px] text-stone-500 font-mono">12 predesigned framework mockups for the dashboard layout</p>
            </div>

            {/* Framework tabs */}
            <div className={`flex flex-wrap border p-1 rounded-xl gap-1 ${isDarkMode ? "bg-stone-900 border-stone-850" : "bg-stone-100 border-stone-200"}`}>
              {["aceternity", "magicui", "v0", "shadcn", "antd", "mui"].map((t) => (
                <button
                  key={t}
                  onClick={() => { setActiveTheme(t); }}
                  className={`px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all ${
                    activeTheme === t 
                      ? "bg-[#0F766E] text-white shadow-md shadow-teal-500/10" 
                      : isDarkMode ? "text-stone-400 hover:text-stone-200" : "text-stone-500 hover:text-stone-800"
                  }`}
                >
                  {t}
                </button>
              ))}
            </div>

            {/* Light / Dark Mode Toggle */}
            <div className={`flex border p-1 rounded-xl gap-1 ${isDarkMode ? "bg-stone-900 border-stone-850" : "bg-stone-100 border-stone-200"}`}>
              <button
                onClick={() => setIsDarkMode(false)}
                className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${
                  !isDarkMode 
                    ? "bg-white text-stone-900 border border-stone-200 shadow-sm" 
                    : "text-stone-500 hover:text-stone-300"
                }`}
              >
                ☀️ Light Mode
              </button>
              <button
                onClick={() => setIsDarkMode(true)}
                className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${
                  isDarkMode 
                    ? "bg-stone-800 text-white border border-stone-700 shadow-sm" 
                    : "text-stone-500 hover:text-stone-300"
                }`}
              >
                🌙 Dark Mode
              </button>
            </div>
          </header>

          {/* Canvas display */}
          <main className="flex-grow p-6 md:p-12 max-w-6xl mx-auto w-full">
            {activeTheme === "aceternity" && !isDarkMode && <AceternityLight />}
            {activeTheme === "aceternity" && isDarkMode && <AceternityDark />}
            {activeTheme === "magicui" && !isDarkMode && <MagicUILight />}
            {activeTheme === "magicui" && isDarkMode && <MagicUIDark />}
            {activeTheme === "v0" && !isDarkMode && <V0Light />}
            {activeTheme === "v0" && isDarkMode && <V0Dark />}
            {activeTheme === "shadcn" && !isDarkMode && <ShadcnLight />}
            {activeTheme === "shadcn" && isDarkMode && <ShadcnDark />}
            {activeTheme === "antd" && !isDarkMode && <AntdLight />}
            {activeTheme === "antd" && isDarkMode && <AntdDark />}
            {activeTheme === "mui" && !isDarkMode && <MuiLight />}
            {activeTheme === "mui" && isDarkMode && <MuiDark />}
          </main>
        </div>
      );
    }

    // ── ACETERNITY LIGHT: Bento grids with soft blurs ──
    function AceternityLight() {
      return (
        <div className="space-y-8 animate-in fade-in duration-300">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-2 bg-white/70 backdrop-blur-md border border-white rounded-3xl p-6 shadow-sm">
              <span className="text-[10px] text-teal-600 font-mono tracking-widest uppercase block mb-1">
                <SparklesIcon /> Strategic Synthesis
              </span>
              <p className="text-xs text-stone-600 leading-relaxed font-mono">
                Starbucks Rewards provides immediate-gratification food loops, whereas Delta Medallion retention maps to long-tail elite travel status levels.
              </p>
            </div>
            <div className="bg-white/70 backdrop-blur-md border border-white rounded-3xl p-6 shadow-sm font-mono">
              <span className="text-[10px] text-stone-400 uppercase tracking-widest block mb-2">Ingestion rate</span>
              <div className="text-xs space-y-2">
                <div className="flex justify-between"><span>Confidence</span><span className="text-stone-900 font-bold">94.8%</span></div>
                <div className="flex justify-between"><span>Sources</span><span className="text-stone-900 font-bold">18</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── ACETERNITY DARK: Bento grid with glowing neon borders ──
    function AceternityDark() {
      return (
        <div className="space-y-8 animate-in fade-in duration-300 text-stone-200">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-2 bg-[#121214] border border-teal-500/20 rounded-3xl p-6 relative overflow-hidden group">
              <div className="absolute top-0 right-0 w-32 h-32 bg-teal-500/[0.04] rounded-full blur-2xl group-hover:bg-teal-500/[0.08]" />
              <span className="text-[10px] font-mono text-teal-400 uppercase tracking-widest block mb-1">
                <SparklesIcon /> Strategic Synthesis
              </span>
              <p className="text-xs text-stone-400 leading-relaxed font-mono">
                Starbucks Rewards provides immediate-gratification food loops, whereas Delta Medallion retention maps to long-tail elite travel status levels.
              </p>
            </div>
            <div className="bg-[#121214] border border-stone-800 rounded-3xl p-6 font-mono relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-teal-500 to-cyan-500" />
              <span className="text-[10px] text-stone-500 uppercase tracking-widest block mb-2">Ingestion rate</span>
              <div className="text-xs space-y-2">
                <div className="flex justify-between"><span>Confidence</span><span className="text-white font-bold">94.8%</span></div>
                <div className="flex justify-between"><span>Sources</span><span className="text-white font-bold">18</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── MAGIC UI LIGHT: Clean interactive glow cards ──
    function MagicUILight() {
      return (
        <div className="space-y-8 animate-in fade-in duration-300">
          <div className="border border-stone-200 bg-white/80 backdrop-blur-md rounded-2xl p-5 relative overflow-hidden shadow-sm">
            <div className="absolute top-3 right-3 flex h-2 w-2">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </div>
            <h3 className="text-xs font-bold font-mono text-stone-850 uppercase tracking-wider mb-2">Verification Telemetry</h3>
            <p className="text-[11px] text-stone-500 font-mono leading-relaxed">
              &gt; Ingestion matrix complete (44 facts extracted successfully).
            </p>
          </div>
        </div>
      );
    }

    // ── MAGIC UI DARK: Dark glow console with beam indicators ──
    function MagicUIDark() {
      return (
        <div className="space-y-8 animate-in fade-in duration-300 text-stone-200">
          <div className="border border-teal-500/20 bg-[#0c0c0e] rounded-2xl p-5 relative overflow-hidden shadow-[0_0_30px_rgba(20,184,166,0.02)]">
            <div className="absolute top-3 right-3 flex h-2 w-2">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
              <span className="relative inline-flex rounded-full h-2 w-2 bg-teal-500"></span>
            </div>
            <h3 className="text-xs font-bold font-mono text-white uppercase tracking-wider mb-2">Verification Telemetry</h3>
            <p className="text-[11px] text-stone-500 font-mono leading-relaxed">
              &gt; Ingestion matrix complete (44 facts extracted successfully).
            </p>
          </div>
        </div>
      );
    }

    // ── V0 LIGHT: Split workspace layout (Light) ──
    function V0Light() {
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-white border border-stone-200 rounded-2xl p-6 shadow-sm animate-in fade-in duration-300">
          <div className="border-r border-stone-200 pr-6 space-y-3">
            <span className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Active Runs</span>
            <div className="bg-stone-50 border border-stone-100 p-3 rounded-lg font-semibold text-xs text-stone-800">Starbucks Rewards</div>
            <div className="bg-stone-50 border border-stone-100 p-3 rounded-lg font-semibold text-xs text-stone-850">Delta SkyMiles</div>
          </div>
          <div className="md:col-span-2 space-y-4">
            <span className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Executive Summary</span>
            <p className="text-xs text-stone-600 leading-relaxed">
              Delta SkyMiles focuses on high-tier traveler lounge retainment, whereas Starbucks operates a fast retail transaction star loop.
            </p>
          </div>
        </div>
      );
    }

    // ── V0 DARK: Split workspace layout (Dark) ──
    function V0Dark() {
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-[#121214] border border-stone-800 rounded-2xl p-6 shadow-xl animate-in fade-in duration-300 text-stone-200">
          <div className="border-r border-stone-800 pr-6 space-y-3">
            <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest">Active Runs</span>
            <div className="bg-stone-900 border border-stone-850 p-3 rounded-lg font-semibold text-xs text-white">Starbucks Rewards</div>
            <div className="bg-stone-900 border border-stone-850 p-3 rounded-lg font-semibold text-xs text-white">Delta SkyMiles</div>
          </div>
          <div className="md:col-span-2 space-y-4">
            <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest">Executive Summary</span>
            <p className="text-xs text-stone-400 leading-relaxed">
              Delta SkyMiles focuses on high-tier traveler lounge retainment, whereas Starbucks operates a fast retail transaction star loop.
            </p>
          </div>
        </div>
      );
    }

    // ── SHADCN LIGHT: Dashboard 05 split tab view (Light) ──
    function ShadcnLight() {
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-white border border-stone-200 rounded-2xl p-6 shadow-sm animate-in fade-in duration-300 text-stone-800">
          <div className="space-y-2">
            <span className="text-[9px] font-bold text-stone-400 uppercase tracking-wider block mb-2">Pipeline list</span>
            <div className="bg-stone-50 border border-stone-300 px-3 py-2 rounded-lg text-xs font-semibold text-stone-850">Starbucks Rewards</div>
            <div className="bg-white border border-stone-200 px-3 py-2 rounded-lg text-xs text-stone-500">Delta SkyMiles</div>
          </div>
          <div className="md:col-span-2 border-l border-stone-100 pl-6 space-y-4">
            <h3 className="text-sm font-semibold text-stone-900">Analyst Brief</h3>
            <p className="text-xs text-stone-600 leading-relaxed">
              Starbucks Rewards utilizes mobile convenience and star-tiers to dominate immediate-gratification food retail loyalty loops.
            </p>
          </div>
        </div>
      );
    }

    // ── SHADCN DARK: Dashboard 05 split tab view (Dark) ──
    function ShadcnDark() {
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-[#121214] border border-stone-800 rounded-2xl p-6 shadow-xl animate-in fade-in duration-300 text-stone-200">
          <div className="space-y-2">
            <span className="text-[9px] font-bold text-stone-500 uppercase tracking-wider block mb-2">Pipeline list</span>
            <div className="bg-stone-900 border border-stone-800 px-3 py-2 rounded-lg text-xs font-semibold text-white">Starbucks Rewards</div>
            <div className="bg-stone-950 border border-stone-850 px-3 py-2 rounded-lg text-xs text-stone-500">Delta SkyMiles</div>
          </div>
          <div className="md:col-span-2 border-l border-stone-850 pl-6 space-y-4">
            <h3 className="text-sm font-semibold text-white">Analyst Brief</h3>
            <p className="text-xs text-stone-400 leading-relaxed">
              Starbucks Rewards utilizes mobile convenience and star-tiers to dominate immediate-gratification food retail loyalty loops.
              The model drives user frequency and digital interaction through its loyalty app.
            </p>
          </div>
        </div>
      );
    }

    // ── ANTD LIGHT: Steps Component (Light) ──
    function AntdLight() {
      return (
        <div className="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm flex gap-4 text-stone-800 animate-in fade-in duration-300">
          <div className="flex-1 flex gap-3">
            <div className="w-6 h-6 rounded-full bg-emerald-50 border border-emerald-300 text-emerald-700 flex items-center justify-center text-xs font-bold font-mono">✓</div>
            <div>
              <span className="text-xs font-bold block text-stone-850">1. Discover</span>
              <span className="text-[10px] text-stone-500 leading-none">18 pages crawled</span>
            </div>
          </div>
          <div className="flex-grow flex gap-3">
            <div className="w-6 h-6 rounded-full bg-teal-50 border border-teal-300 text-teal-700 flex items-center justify-center text-xs font-bold animate-pulse font-mono">●</div>
            <div>
              <span className="text-xs font-bold block text-teal-700">2. Verify Claims</span>
              <span className="text-[10px] text-stone-500 leading-none">Running gate checks</span>
            </div>
          </div>
        </div>
      );
    }

    // ── ANTD DARK: Steps Component (Dark) ──
    function AntdDark() {
      return (
        <div className="bg-[#121214] border border-stone-800 rounded-2xl p-6 shadow-xl flex gap-4 text-stone-250 font-mono animate-in fade-in duration-300">
          <div className="flex-1 flex gap-3">
            <div className="w-6 h-6 rounded-full bg-emerald-950/20 border border-emerald-500/30 text-emerald-400 flex items-center justify-center text-xs font-bold">✓</div>
            <div>
              <span className="text-xs font-bold block text-white">1. Discover</span>
              <span className="text-[10px] text-stone-500 leading-none">18 pages crawled</span>
            </div>
          </div>
          <div className="flex-grow flex gap-3">
            <div className="w-6 h-6 rounded-full bg-teal-950/20 border border-teal-500/30 text-teal-450 flex items-center justify-center text-xs font-bold animate-pulse">●</div>
            <div>
              <span className="text-xs font-bold block text-teal-400">2. Verify Claims</span>
              <span className="text-[10px] text-stone-500 leading-none">Running gate checks</span>
            </div>
          </div>
        </div>
      );
    }

    // ── MUI LIGHT: Elevated Blue Header Metric Cards (Light) ──
    function MuiLight() {
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 animate-in fade-in duration-300 text-stone-800">
          <div className="bg-white rounded-xl p-5 border border-stone-200 shadow-md flex justify-between items-start">
            <div className="space-y-1">
              <span className="text-[10px] font-bold text-stone-400 uppercase">Extraction success rate</span>
              <span className="text-base font-bold text-stone-800">98.2%</span>
            </div>
          </div>
          <div className="bg-white rounded-xl p-5 border border-stone-200 shadow-md flex justify-between items-start">
            <div className="space-y-1">
              <span className="text-[10px] font-bold text-stone-400 uppercase">System Latency</span>
              <span className="text-base font-bold text-stone-800">4.8s</span>
            </div>
          </div>
        </div>
      );
    }

    // ── MUI DARK: Elevated Blue Header Metric Cards (Dark) ──
    function MuiDark() {
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 animate-in fade-in duration-300 text-stone-200">
          <div className="bg-[#121214] rounded-xl p-5 border border-stone-800 shadow-xl flex justify-between items-start">
            <div className="space-y-1">
              <span className="text-[10px] font-bold text-stone-500 uppercase">Extraction success rate</span>
              <span className="text-base font-bold text-white">98.2%</span>
            </div>
          </div>
          <div className="bg-[#121214] rounded-xl p-5 border border-stone-800 shadow-xl flex justify-between items-start">
            <div className="space-y-1">
              <span className="text-[10px] font-bold text-stone-500 uppercase">System Latency</span>
              <span className="text-base font-bold text-white">4.8s</span>
            </div>
          </div>
        </div>
      );
    }

    // Render react application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
