services:
  postgres:
    image: postgres:15-alpine
    container_name: infovac_postgres
    environment:
      POSTGRES_USER: infovac
      POSTGRES_PASSWORD: infovac_dev
      POSTGRES_DB: infovac
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infovac -d infovac"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
